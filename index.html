<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>UstozPro CRM • Professional Ta'lim Platformasi</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- XLSX -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <style>
        /* ============================================ */
        /* ROOT VARIABLES & GLOBAL STYLES */
        /* ============================================ */
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #06b6d4;
            --dark: #0f172a;
            --darker: #020617;
            --light: #f8fafc;
            --gray: #64748b;
            --border-color: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(15, 23, 42, 0.7);
            --sidebar-width: 280px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            color: #e2e8f0;
        }

        /* Matematik background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                repeating-linear-gradient(45deg, rgba(59, 130, 246, 0.02) 0px, rgba(59, 130, 246, 0.02) 2px, transparent 2px, transparent 8px),
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.04) 0%, transparent 50%),
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400"><text x="10" y="30" font-size="14" fill="rgba(56,189,248,0.03)" font-family="monospace">∫</text><text x="80" y="80" font-size="12" fill="rgba(139,92,246,0.03)" font-family="monospace">∑</text><text x="150" y="40" font-size="16" fill="rgba(6,182,212,0.03)" font-family="monospace">∞</text><text x="300" y="350" font-size="10" fill="rgba(255,255,255,0.02)" font-family="monospace">E=mc²</text></svg>');
            background-size: 100px 100px, 100% 100%, 400px 400px;
            pointer-events: none;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            display: flex;
            min-height: 100vh;
        }

        /* ============================================ */
        /* CUSTOM SCROLLBAR */
        /* ============================================ */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 10px; }

        /* ============================================ */
        /* SIDEBAR */
        /* ============================================ */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(30px);
            border-right: 1px solid var(--border-color);
            position: fixed;
            left: 0; top: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header { padding: 24px 20px; border-bottom: 1px solid var(--border-color); }
        
        .logo { display: flex; align-items: center; gap: 12px; }
        
        .logo-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--info));
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: 800; color: white;
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .logo-icon::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="30" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/><circle cx="50" cy="50" r="20" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/><text x="35" y="60" font-size="40" fill="white" font-family="monospace" font-weight="bold">UP</text></svg>');
            background-size: cover;
            opacity: 0.3;
        }
        
        .logo-text h2 { 
            font-size: 20px; 
            font-weight: 700; 
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-text span { font-size: 11px; color: var(--gray); letter-spacing: 1px; }

        .sidebar-nav { flex: 1; padding: 20px 12px; overflow-y: auto; }
        
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-radius: 14px;
            color: #94a3b8; font-weight: 500; font-size: 14px;
            cursor: pointer; transition: all 0.2s;
            margin-bottom: 4px; border: none; background: transparent;
            width: 100%; text-align: left;
        }
        
        .nav-item i { width: 24px; font-size: 18px; }
        .nav-item:hover { background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
        .nav-item.active {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.1));
            color: white; border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .sidebar-footer { padding: 20px; border-top: 1px solid var(--border-color); }
        
        .user-card {
            display: flex; align-items: center; gap: 12px;
            padding: 12px; background: rgba(255, 255, 255, 0.03);
            border-radius: 16px; margin-bottom: 12px;
        }
        
        .user-avatar {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 18px; color: white;
        }
        
        .user-info h4 { font-size: 14px; font-weight: 600; }
        .user-info p { font-size: 12px; color: var(--gray); }

        /* ============================================ */
        /* MAIN CONTENT */
        /* ============================================ */
        .main-content { flex: 1; margin-left: var(--sidebar-width); padding: 24px 32px; }

        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 28px; flex-wrap: wrap; gap: 16px;
        }
        
        .page-title h1 { font-size: 28px; font-weight: 700; color: white; }
        .page-title p { color: var(--gray); font-size: 14px; margin-top: 4px; }

        /* ============================================ */
        /* STATS GRID */
        /* ============================================ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 28px;
        }
        
        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px; padding: 24px;
            border: 1px solid var(--border-color);
            transition: transform 0.2s;
        }
        
        .stat-card:hover { transform: translateY(-4px); }
        .stat-value { font-size: 36px; font-weight: 700; color: white; }
        .stat-label { color: var(--gray); font-size: 14px; margin-top: 8px; }

        /* ============================================ */
        /* CARDS */
        /* ============================================ */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px; padding: 24px;
            border: 1px solid var(--border-color);
            margin-bottom: 28px;
        }
        
        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; flex-wrap: wrap; gap: 16px;
        }
        
        .card-title { font-size: 20px; font-weight: 600; color: white; }

        /* ============================================ */
        /* TABLE */
        /* ============================================ */
        .table-wrapper { overflow-x: auto; border-radius: 16px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        
        th {
            text-align: left; padding: 16px 12px; color: var(--gray);
            font-weight: 500; font-size: 11px; text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
        }
        
        td {
            padding: 14px 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: #cbd5e1;
        }
        
        tr:hover td { background: rgba(59, 130, 246, 0.05); }
        
        .clickable-row { cursor: pointer; }
        .clickable-row:hover { background: rgba(59, 130, 246, 0.1); }

        /* ============================================ */
        /* BUTTONS */
        /* ============================================ */
        .btn {
            padding: 10px 20px; border-radius: 40px; font-weight: 500;
            font-size: 14px; cursor: pointer; transition: all 0.3s;
            display: inline-flex; align-items: center; gap: 8px;
            background: transparent; color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none; color: white;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4); }
        
        .btn-danger { background: linear-gradient(135deg, var(--danger), #dc2626); border: none; color: white; }
        .btn-warning { background: linear-gradient(135deg, var(--warning), #d97706); border: none; color: white; }
        .btn-success { background: linear-gradient(135deg, var(--success), #059669); border: none; color: white; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }

        .action-icons { display: flex; gap: 8px; }
        
        .action-icon {
            width: 34px; height: 34px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
            color: #94a3b8; background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .action-icon:hover { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .action-icon.delete:hover { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        /* ============================================ */
        /* BADGES */
        /* ============================================ */
        .badge {
            padding: 4px 12px; border-radius: 40px; font-size: 12px;
            font-weight: 500; display: inline-block;
        }
        
        .badge-success { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .badge-danger { background: rgba(239, 68, 68, 0.15); color: #f87171; }
        .badge-warning { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .badge-info { background: rgba(6, 182, 212, 0.15); color: #22d3ee; }

        /* ============================================ */
        /* MODAL */
        /* ============================================ */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: center;
            z-index: 10000; visibility: hidden; opacity: 0; transition: all 0.3s;
        }
        
        .modal-overlay.active { visibility: visible; opacity: 1; }
        
        .modal {
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(30px);
            border-radius: 32px; max-width: 600px; width: 90%;
            max-height: 85vh; overflow-y: auto; padding: 32px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            transform: scale(0.9); transition: transform 0.3s;
        }
        
        .modal-overlay.active .modal { transform: scale(1); }
        
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 28px;
        }
        
        .modal-title { font-size: 24px; font-weight: 600; color: white; }
        
        .modal-close {
            width: 40px; height: 40px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
        }

        .form-group { margin-bottom: 22px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 500; color: #94a3b8; }
        
        input, select, textarea {
            width: 100%; padding: 14px 16px;
            background: rgba(0, 0, 0, 0.35); border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; font-size: 15px; color: #e2e8f0;
            transition: all 0.2s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--primary);
            background: rgba(0, 0, 0, 0.45);
        }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        
        .modal-footer {
            display: flex; justify-content: flex-end; gap: 14px;
            margin-top: 28px; padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }

        /* ============================================ */
        /* LOGIN */
        /* ============================================ */
        .login-container {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 10; padding: 20px;
        }
        
        .login-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(40px);
            border-radius: 48px; padding: 52px;
            width: 100%; max-width: 450px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.6);
        }
        
        .login-header { text-align: center; margin-bottom: 48px; }
        
        .login-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--info));
            border-radius: 24px; display: flex; align-items: center; justify-content: center;
            font-size: 36px; font-weight: 800; color: white;
            margin: 0 auto 28px;
            position: relative;
            overflow: hidden;
        }
        
        .login-icon::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="30" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/><text x="32" y="62" font-size="36" fill="white" font-family="monospace" font-weight="bold">UP</text></svg>');
            background-size: cover;
        }
        
        .login-header h2 { 
            font-size: 32px; 
            font-weight: 700; 
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .login-header p { color: var(--gray); margin-top: 12px; }

        /* ============================================ */
        /* TOAST */
        /* ============================================ */
        .toast-container {
            position: fixed; bottom: 24px; right: 24px; z-index: 99999;
        }
        
        .toast {
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(30px);
            padding: 18px 28px; border-radius: 60px; color: white;
            font-weight: 500; margin-top: 12px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            display: flex; align-items: center; gap: 14px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .toast.success i { color: var(--success); }
        .toast.error i { color: var(--danger); }
        .toast.warning i { color: var(--warning); }

        /* ============================================ */
        /* UTILS */
        /* ============================================ */
        .hidden { display: none !important; }
        .loading { display: flex; align-items: center; justify-content: center; padding: 60px; }
        
        .loader {
            width: 32px; height: 32px;
            border: 3px solid rgba(59, 130, 246, 0.2);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .flex { display: flex; } .items-center { align-items: center; }
        .gap-2 { gap: 8px; } .gap-4 { gap: 16px; }
        .justify-between { justify-content: space-between; }
        .mb-4 { margin-bottom: 16px; } .mt-4 { margin-top: 16px; }
        .text-center { text-align: center; }
        .w-full { width: 100%; }

        /* Bot logo badge */
        .bot-badge {
            position: fixed;
            bottom: 20px;
            left: calc(var(--sidebar-width) + 20px);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 50;
            font-size: 14px;
            color: #94a3b8;
        }
        
        .bot-badge i {
            color: var(--primary);
            font-size: 20px;
        }
        
        .bot-badge strong {
            color: white;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- LOGIN PANEL -->
    <div id="loginPanel" class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">UP</div>
                <h2>UstozPro CRM</h2>
                <p>@UstozProBot • Professional ta'lim platformasi</p>
            </div>
            <form id="loginForm">

                    <input type="text" id="loginUsername" placeholder="Loginni kiriting" required>
                </div>

    <!-- SIDEBAR -->
    <aside class="sidebar hidden" id="sidebar">

                <div class="logo-text">
                    <h2>UstozPro</h2>
                    <span>@UstozProBot</span>

        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar" id="userAvatar">UP</div>
                <div class="user-info">
                    <h4 id="sidebarUserName">Foydalanuvchi</h4>
                    <p id="sidebarBranchInfo"></p>
                </div>
            </div>
            <button class="btn w-full" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Chiqish

        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content hidden" id="mainContent"></main>
    
    <!-- Bot badge -->
    <div class="bot-badge" id="botBadge">
        <i class="fab fa-telegram"></i>
        <span>Powered by <strong>@UstozProBot</strong></span>
    </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

        // Filial Admin yoki O'qituvchi
        const { data: user, error } = await sb.from('users')
            .select('*, branches(*), subjects(*)')
            .eq('login', username)
            .eq('password', password)
            .maybeSingle();
            
        if(!error && user) {
            if(!user.is_active) { showToast('Hisobingiz muzlatilgan', 'error'); return; }
            currentUser = user;
            currentBranch = user.branches;
            loginSuccess();
            return;
        }
        
        // O'quvchi
        const { data: student, error: sError } = await sb.from('students')
            .select('*')
            .eq('login', username)
            .eq('password', password)
            .maybeSingle();
            
        if(!sError && student) {
            if(!student.is_active) { showToast('Hisobingiz muzlatilgan', 'error'); return; }
            currentUser = { ...student, role: 'student' };
            currentBranch = null;
            loginSuccess();
            return;
        }
        
        showToast('Login yoki parol xato', 'error');
    });

            const { data: payments } = await sb.from('expenses').select('amount').eq('expense_type', 'salary').eq('created_by', t.id);
            const paid = payments?.reduce((s,p)=>s+(+p.amount||0),0)||0;
            html += `<tr><td>${t.full_name}</td><td>${t.salary?.toLocaleString()||0}</td><td>${paid.toLocaleString()}</td><td>${((t.salary||0)-paid).toLocaleString()}</td>
                <td><button class="btn btn-sm btn-success" onclick="paySalary('${t.id}', ${t.salary||0}, ${paid})"><i class="fas fa-check"></i> To'lash</button></td></tr>`;
        }
        html += `</tbody></table></div></div>`; mainContent.innerHTML = html;
    }
    
    window.paySalary = (teacherId, salary, paid) => {
        const remaining = salary - paid;
        if(remaining <= 0) { showToast('Oylik to\'liq to\'langan', 'warning'); return; }
        openModal(`
            <div class="modal-header"><h3 class="modal-title">Oylik to'lash</h3><div class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></div></div>
            <form onsubmit="saveSalaryPayment(event, '${teacherId}')">
                <div class="form-group"><label>Summa</label><input type="number" name="amount" value="${remaining}" max="${remaining}" required></div>
                <div class="form-group"><label>Izoh</label><input name="description" value="Oylik maosh"></div>
                <input type="hidden" name="expense_type" value="salary"><input type="hidden" name="branch_id" value="${currentBranch?.id}">
                <div class="modal-footer"><button type="button" class="btn" onclick="closeModal()">Bekor</button><button class="btn btn-primary">To'lash</button></div>
            </form>
        `);
    };
    
    window.saveSalaryPayment = async (e, teacherId) => {
        e.preventDefault(); const data = Object.fromEntries(new FormData(e.target));
        await sb.from('expenses').insert({...data, created_by: teacherId});
        closeModal(); renderTeacherSalaries(); showToast('Oylik to\'landi');
    };
    
    async function renderSubjects() {
        const { data } = await sb.from('subjects').select('*');
        let html = `<div class="page-header"><h1>Fanlar</h1><button class="btn btn-primary" onclick="openSubjectForm()"><i class="fas fa-plus"></i> Qo'shish</button></div>
            <div class="card"><div class="table-wrapper"><table><thead><tr><th>Nomi</th><th>Tavsif</th><th>Amallar</th></tr></thead><tbody>`;
        data?.forEach(s => html += `<tr><td>${s.name}</td><td>${s.description||'-'}</td>
            <td><div class="action-icons"><div class="action-icon delete" onclick="deleteSubject('${s.id}')"><i class="fas fa-trash"></i></div></div></td></tr>`);
        html += `</tbody></table></div></div>`; mainContent.innerHTML = html;
    }
    
    window.openSubjectForm = () => {
        openModal(`
            <div class="modal-header"><h3 class="modal-title">Yangi fan</h3><div class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></div></div>
            <form onsubmit="saveSubject(event)"><div class="form-group"><label>Nomi</label><input name="name" required></div>
            <div class="form-group"><label>Tavsif</label><textarea name="description"></textarea></div>
            <div class="modal-footer"><button type="button" class="btn" onclick="closeModal()">Bekor</button><button class="btn btn-primary">Saqlash</button></div></form>
        `);
    };
    
    window.saveSubject = async (e) => {
        e.preventDefault(); const data = Object.fromEntries(new FormData(e.target));
        await sb.from('subjects').insert(data); closeModal(); renderSubjects(); showToast('Saqlandi');
    };
    
    window.deleteSubject = async (id) => {
        if(!confirm('O\'chirishni tasdiqlaysizmi?')) return;
        await sb.from('subjects').delete().eq('id', id); renderSubjects(); showToast('O\'chirildi');
    };
    
    // ============================================
    // O'QITUVCHI
    // ============================================
    async function renderTeacherDashboard() {
        const { data: groups } = await sb.from('groups').select('*').eq('teacher_id', currentUser?.id);
        mainContent.innerHTML = `<div class="page-header"><h1>${currentUser?.full_name}</h1></div>
            <div class="stats-grid"><div class="stat-card"><div class="stat-value">${groups?.length||0}</div><div class="stat-label">Guruhlarim</div></div></div>`;
    }
    
    async function renderMyGroups() {
        const { data: groups } = await sb.from('groups').select('*, subjects(name)').eq('teacher_id', currentUser?.id);
        let html = `<div class="page-header"><h1>Mening guruhlarim</h1></div><div class="card"><div class="table-wrapper"><table><thead><tr><th>Nomi</th><th>Fan</th><th>Narx</th></tr></thead><tbody>`;
        groups?.forEach(g => html += `<tr><td>${g.name}</td><td>${g.subjects?.name||'-'}</td><td>${g.price?.toLocaleString()}</td></tr>`);
        html += `</tbody></table></div></div>`; mainContent.innerHTML = html;
    }
    
    async function renderMyStudents() {
        const { data: groups } = await sb.from('groups').select('id,name').eq('teacher_id', currentUser?.id);
        let html = `<div class="page-header"><h1>O'quvchilarim</h1></div>`;
        for(const g of groups || []) {
            const { data: students } = await sb.from('group_students').select('*, students(full_name,phone)').eq('group_id', g.id).eq('status', 'active');
            html += `<div class="card"><h3>${g.name}</h3><div class="table-wrapper"><table><thead><tr><th>O'quvchi</th><th>Telefon</th></tr></thead><tbody>`;
            students?.forEach(s => html += `<tr><td>${s.students?.full_name}</td><td>${s.students?.phone||'-'}</td></tr>`);
            html += `</tbody></table></div></div>`;
        }
        mainContent.innerHTML = html;
    }
    
    async function renderMySalary() {
        const paid = 0;
        const salary = currentUser?.salary || 0;
        mainContent.innerHTML = `<div class="page-header"><h1>Mening oyligim</h1></div>
            <div class="card"><div style="padding:30px; text-align:center;">
                <div style="font-size:48px; font-weight:700;">${salary.toLocaleString()} so'm</div>
                <div style="color:#64748b;">Oylik maosh</div>
                <div style="margin-top:20px;">To'langan: ${paid.toLocaleString()} so'm</div>
                <div>Qoldiq: ${(salary-paid).toLocaleString()} so'm</div>
            </div></div>`;
    }
    
    // ============================================
    // O'QUVCHI
    // ============================================
    async function renderStudentDashboard() {
        const { data: groups } = await sb.from('group_students').select('*, groups(name)').eq('student_id', currentUser.id).eq('status', 'active');
        mainContent.innerHTML = `<div class="page-header"><h1>${currentUser.full_name}</h1></div>
            <div class="stats-grid"><div class="stat-card"><div class="stat-value">${groups?.length||0}</div><div class="stat-label">Guruhlarim</div></div></div>`;
    }
    
    async function renderStudentSchedule() {
        const { data: groups } = await sb.from('group_students').select('*, groups(name, lesson_time_id)').eq('student_id', currentUser.id).eq('status', 'active');
        let html = `<div class="page-header"><h1>Dars jadvalim</h1></div><div class="card">`;
        groups?.forEach(g => html += `<div style="padding:16px; border-bottom:1px solid rgba(255,255,255,0.05);"><h3>${g.groups?.name}</h3><p>Dars vaqti: 09:00 - 10:30</p></div>`);
        html += `</div>`; mainContent.innerHTML = html;
    }
    
    async function renderStudentAttendance() {
        const { data: attendance } = await sb.from('attendance').select('*, groups(name)').eq('student_id', currentUser.id).order('lesson_date', { ascending: false }).limit(30);
        let html = `<div class="page-header"><h1>Davomatim</h1></div><div class="card"><div class="table-wrapper"><table><thead><tr><th>Sana</th><th>Guruh</th><th>Holat</th></tr></thead><tbody>`;
        attendance?.forEach(a => html += `<tr><td>${a.lesson_date}</td><td>${a.groups?.name}</td><td><span class="badge ${a.status==='present'?'badge-success':'badge-danger'}">${a.status}</span></td></tr>`);
        html += `</tbody></table></div></div>`; mainContent.innerHTML = html;
    }
    
    async function renderStudentPayments() {
        const { data: payments } = await sb.from('payments').select('*, groups(name)').eq('student_id', currentUser.id).order('payment_date', { ascending: false });
        let html = `<div class="page-header"><h1>To'lovlarim</h1></div><div class="card"><div class="table-wrapper"><table><thead><tr><th>Sana</th><th>Guruh</th><th>Summa</th></tr></thead><tbody>`;
        payments?.forEach(p => html += `<tr><td>${p.payment_date}</td><td>${p.groups?.name||'-'}</td><td>${p.amount?.toLocaleString()}</td></tr>`);
        html += `</tbody></table></div></div>`; mainContent.innerHTML = html;
    }
    
    // ============================================
    // MUROJAATLAR
    // ============================================
    async function renderLeads() {
        const { data: leads } = await sb.from('leads').select('*').order('created_at', { ascending: false });
        let html = `<div class="page-header"><h1>Murojaatlar</h1><button class="btn btn-primary" onclick="openLeadForm()"><i class="fas fa-plus"></i> Qo'shish</button></div>
            <div class="card"><div class="table-wrapper"><table><thead><tr><th>Ism</th><th>Telefon</th><th>Fan</th><th>Status</th><th>Sana</th></tr></thead><tbody>`;
        leads?.forEach(l => html += `<tr><td>${l.full_name}</td><td>${l.phone}</td><td>${l.interested_subject||'-'}</td>
            <td><span class="badge ${l.status==='new'?'badge-info':l.status==='contacted'?'badge-warning':l.status==='registered'?'badge-success':'badge-danger'}">${l.status}</span></td>
            <td>${new Date(l.created_at).toLocaleDateString()}</td></tr>`);
        html += `</tbody></table></div></div>`; mainContent.innerHTML = html;
    }
    
    window.openLeadForm = () => {
        openModal(`
            <div class="modal-header"><h3 class="modal-title">Yangi murojaat</h3><div class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></div></div>
            <form onsubmit="saveLead(event)">
                <div class="form-group"><label>Ism</label><input name="full_name" required></div>
                <div class="form-group"><label>Telefon</label><input name="phone" required></div>
                <div class="form-group"><label>Qiziqadigan fan</label><input name="interested_subject"></div>
                <div class="form-group"><label>Manba</label><input name="source" placeholder="Instagram, Telegram..."></div>
                <div class="form-group"><label>Izoh</label><textarea name="comment"></textarea></div>
                <div class="modal-footer"><button type="button" class="btn" onclick="closeModal()">Bekor</button><button class="btn btn-primary">Saqlash</button></div>
            </form>
        `);
    };
    
    window.saveLead = async (e) => {
        e.preventDefault(); const data = Object.fromEntries(new FormData(e.target));
        await sb.from('leads').insert({...data, status: 'new'});
        closeModal(); renderLeads(); showToast('Murojaat saqlandi');
    };
    
    // ============================================
    // ARXIV
    // ============================================
    async function renderArchive() {
        const { data: students } = await sb.from('students').select('*').eq('is_active', false);
        const { data: teachers } = await sb.from('users').select('*').eq('is_active', false);
        const { data: groups } = await sb.from('groups').select('*').neq('status', 'active');
        
        let html = `<div class="page-header"><h1>Arxiv</h1></div>
            <div class="card"><h3 class="card-title">Arxivlangan o'quvchilar</h3><div class="table-wrapper"><table><thead><tr><th>Ism</th><th>Telefon</th></tr></thead><tbody>`;
        students?.forEach(s => html += `<tr><td>${s.full_name}</td><td>${s.phone||'-'}</td></tr>`);
        html += `</tbody></table></div></div>
            <div class="card"><h3 class="card-title">Arxivlangan o'qituvchilar</h3><div class="table-wrapper"><table><thead><tr><th>Ism</th><th>Login</th></tr></thead><tbody>`;
        teachers?.forEach(t => html += `<tr><td>${t.full_name}</td><td>${t.login}</td></tr>`);
        html += `</tbody></table></div></div>
            <div class="card"><h3 class="card-title">Yakunlangan guruhlar</h3><div class="table-wrapper"><table><thead><tr><th>Nomi</th><th>Status</th></tr></thead><tbody>`;
        groups?.forEach(g => html += `<tr><td>${g.name}</td><td>${g.status}</td></tr>`);
        html += `</tbody></table></div></div>`;
        mainContent.innerHTML = html;
    }
    
})();
</script>
</body>
</html>
