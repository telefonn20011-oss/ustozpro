<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>UstozPro CRM - Fixed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --primary:#3b82f6;
            --secondary:#8b5cf6;
            --success:#10b981;
            --warning:#f59e0b;
            --danger:#ef4444;
            --gray:#94a3b8;
            --gray-2:#64748b;
            --border-color:rgba(255,255,255,0.08);
            --card-bg:rgba(15,23,42,0.72);
            --sidebar-width:280px;
        }

        body {
            font-family:'Plus Jakarta Sans', sans-serif;
            background:linear-gradient(135deg,#020617 0%,#0f172a 54%,#172554 100%);
            min-height:100vh;
            color:#e2e8f0;
        }

        .app { display:flex; min-height:100vh; }
        .hidden { display:none!important; }
        .w-full { width:100%; }
        .text-center { text-align:center; }
        .text-success { color:#34d399; }
        .text-danger { color:#f87171; }
        .muted-small { color:var(--gray); font-size:11px; }

        .sidebar {
            width:var(--sidebar-width);
            background:rgba(2,6,23,0.96);
            backdrop-filter:blur(26px);
            border-right:1px solid var(--border-color);
            position:fixed;
            left:0;
            top:0;
            bottom:0;
            display:flex;
            flex-direction:column;
            z-index:1000;
            transition:transform .25s ease;
        }

        .sidebar-header { padding:20px 16px; border-bottom:1px solid var(--border-color); }
        .logo { display:flex; align-items:center; gap:12px; }
        .logo-icon {
            width:44px;
            height:44px;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            border-radius:14px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:20px;
            font-weight:800;
            color:white;
            flex-shrink:0;
        }
        .logo-text h2 { font-size:18px; font-weight:700; color:white; }
        .logo-text span { font-size:10px; color:var(--gray); }

        .sidebar-nav { flex:1; padding:16px 12px; overflow-y:auto; }
        .nav-item {
            display:flex;
            align-items:center;
            gap:12px;
            padding:12px 14px;
            border-radius:12px;
            color:var(--gray);
            font-weight:500;
            font-size:14px;
            cursor:pointer;
            transition:all .2s;
            width:100%;
            text-align:left;
            background:transparent;
            border:none;
            overflow-wrap:anywhere;
        }
        .nav-item:hover { background:rgba(59,130,246,.10); color:#60a5fa; }
        .nav-item.active {
            background:linear-gradient(135deg,rgba(59,130,246,.22),rgba(139,92,246,.12));
            color:white;
        }

        .sidebar-footer { padding:16px; border-top:1px solid var(--border-color); }
        .user-card {
            display:flex;
            align-items:center;
            gap:12px;
            padding:10px;
            background:rgba(255,255,255,.035);
            border-radius:14px;
            margin-bottom:12px;
            min-width:0;
        }
        .user-avatar {
            width:40px;
            height:40px;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            border-radius:12px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:700;
            color:white;
            flex-shrink:0;
        }
        .user-info { min-width:0; }
        .user-info h4 { font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .user-info p { font-size:11px; color:var(--gray); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

        .main-content {
            flex:1;
            margin-left:var(--sidebar-width);
            padding:24px 28px;
            min-height:100vh;
            min-width:0;
        }

        .mobile-menu-toggle {
            display:none;
            position:fixed;
            top:16px;
            left:16px;
            z-index:1001;
            background:rgba(15,23,42,.92);
            backdrop-filter:blur(10px);
            border:1px solid var(--border-color);
            border-radius:12px;
            width:44px;
            height:44px;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            color:white;
            font-size:20px;
        }

        .page-header {
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:24px;
            flex-wrap:wrap;
            gap:16px;
            min-width:0;
        }
        .page-title, .page-header > div { min-width:0; }
        .page-title h1, .page-header h1 {
            font-size:24px;
            font-weight:700;
            color:white;
            line-height:1.25;
            overflow-wrap:anywhere;
        }
        .page-title p { color:var(--gray); font-size:13px; margin-top:4px; }

        .stats-grid {
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
            gap:16px;
            margin-bottom:24px;
        }
        .stat-card {
            background:var(--card-bg);
            backdrop-filter:blur(18px);
            border-radius:16px;
            padding:18px;
            border:1px solid var(--border-color);
            min-width:0;
            overflow-wrap:anywhere;
        }
        .stat-value { font-size:28px; font-weight:700; color:white; line-height:1.22; overflow-wrap:anywhere; }
        .stat-label { color:var(--gray); font-size:13px; margin-top:6px; }

        .card {
            background:var(--card-bg);
            backdrop-filter:blur(18px);
            border-radius:16px;
            padding:22px;
            border:1px solid var(--border-color);
            margin-bottom:22px;
            min-width:0;
            overflow-wrap:anywhere;
        }
        .card-title { font-size:18px; font-weight:600; color:white; margin-bottom:18px; line-height:1.25; }

        .table-wrapper {
            width:100%;
            max-width:100%;
            overflow-x:auto;
            -webkit-overflow-scrolling:touch;
            border-radius:14px;
        }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th {
            text-align:left;
            padding:13px 14px;
            color:var(--gray);
            font-weight:600;
            font-size:10px;
            text-transform:uppercase;
            border-bottom:1px solid var(--border-color);
            letter-spacing:0;
        }
        td {
            padding:13px 14px;
            border-bottom:1px solid rgba(255,255,255,.035);
            color:#cbd5e1;
            vertical-align:middle;
            max-width:220px;
            overflow-wrap:anywhere;
        }
        tr:hover td { background:rgba(59,130,246,.05); }
        .ellipsis {
            display:inline-block;
            max-width:100%;
            overflow:hidden;
            text-overflow:ellipsis;
            white-space:nowrap;
            vertical-align:bottom;
        }

        .compact-table table {
            table-layout:fixed;
            min-width:720px;
        }
        .compact-table th,
        .compact-table td {
            padding:10px 12px;
            font-size:12px;
        }
        .compact-table .col-date { width:92px; }
        .compact-table .col-student { width:170px; }
        .compact-table .col-group { width:160px; }
        .compact-table .col-amount { width:128px; }
        .compact-table .col-type { width:94px; }
        .compact-table .col-id { width:88px; }
        .compact-table .col-action { width:58px; }

        .badge {
            padding:4px 10px;
            border-radius:999px;
            font-size:11px;
            font-weight:600;
            display:inline-block;
            white-space:nowrap;
        }
        .badge-success { background:rgba(16,185,129,.15); color:#34d399; }
        .badge-danger { background:rgba(239,68,68,.15); color:#f87171; }
        .badge-warning { background:rgba(245,158,11,.15); color:#fbbf24; }
        .badge-info { background:rgba(6,182,212,.15); color:#22d3ee; }
        .badge-archived { background:rgba(100,116,139,.15); color:#94a3b8; }

        .btn {
            padding:10px 16px;
            border-radius:999px;
            font-weight:600;
            font-size:13px;
            cursor:pointer;
            transition:all .2s;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap:8px;
            background:transparent;
            color:#e2e8f0;
            border:1px solid rgba(255,255,255,.12);
            min-width:0;
        }
        .btn:hover { background:rgba(255,255,255,.06); }
        .btn-primary { background:linear-gradient(135deg,var(--primary),var(--secondary)); border:none; color:white; }
        .btn-danger { background:linear-gradient(135deg,var(--danger),#dc2626); border:none; color:white; }
        .btn-warning { background:linear-gradient(135deg,#f59e0b,#d97706); border:none; color:white; }
        .btn-success { background:linear-gradient(135deg,var(--success),#059669); border:none; color:white; }
        .btn-sm { padding:7px 12px; font-size:11px; }

        .action-icons { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
        .action-icon, .btn-icon {
            width:32px;
            height:32px;
            border-radius:10px;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            color:#94a3b8;
            background:rgba(255,255,255,.03);
            border:1px solid rgba(255,255,255,.06);
            transition:all .2s;
            flex-shrink:0;
        }
        .btn-icon { width:38px; height:38px; border-radius:12px; }
        .action-icon:hover, .btn-icon:hover { background:rgba(59,130,246,.18); color:#60a5fa; }
        .action-icon.delete:hover, .btn-icon.delete:hover { background:rgba(239,68,68,.18); color:#f87171; }
        .action-icon.pay:hover { background:rgba(16,185,129,.18); color:#34d399; }
        .action-icon.lock:hover { background:rgba(245,158,11,.18); color:#fbbf24; }

        .modal-overlay {
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.82);
            backdrop-filter:blur(12px);
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:10000;
            visibility:hidden;
            opacity:0;
            transition:all .25s;
            padding:16px;
        }
        .modal-overlay.active { visibility:visible; opacity:1; }
        .modal {
            background:rgba(15,23,42,.98);
            backdrop-filter:blur(26px);
            border-radius:22px;
            max-width:680px;
            width:100%;
            max-height:88vh;
            overflow-y:auto;
            padding:22px;
            border:1px solid rgba(56,189,248,.2);
            transform:scale(.96);
            transition:transform .25s;
            min-width:0;
            overflow-wrap:anywhere;
        }
        .modal-overlay.active .modal { transform:scale(1); }
        .modal-header { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:22px; }
        .modal-title { font-size:20px; font-weight:700; color:white; line-height:1.25; overflow-wrap:anywhere; }
        .modal-close {
            width:36px;
            height:36px;
            border-radius:12px;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            background:rgba(255,255,255,.05);
            color:#94a3b8;
            flex-shrink:0;
        }
        .form-group { margin-bottom:18px; min-width:0; }
        label { display:block; margin-bottom:8px; font-size:12px; font-weight:600; color:#94a3b8; }
        input, select, textarea {
            width:100%;
            padding:13px 15px;
            background:rgba(0,0,0,.34);
            border:1.5px solid rgba(255,255,255,.10);
            border-radius:12px;
            font-size:14px;
            color:#e2e8f0;
            min-width:0;
        }
        textarea { resize:vertical; }
        input:focus, select:focus, textarea:focus { outline:none; border-color:var(--primary); }
        option { background:#0f172a; color:#e2e8f0; }
        .modal-footer {
            display:flex;
            justify-content:flex-end;
            gap:10px;
            margin-top:22px;
            padding-top:18px;
            border-top:1px solid var(--border-color);
            flex-wrap:wrap;
        }

        .toast-container { position:fixed; bottom:20px; right:20px; z-index:99999; max-width:min(420px,calc(100vw - 32px)); }
        .toast {
            background:rgba(15,23,42,.98);
            backdrop-filter:blur(24px);
            padding:13px 18px;
            border-radius:999px;
            color:white;
            font-weight:600;
            margin-top:10px;
            border:1px solid rgba(56,189,248,.2);
            display:flex;
            align-items:center;
            gap:10px;
            animation:slideIn .25s ease;
            font-size:13px;
            overflow-wrap:anywhere;
        }
        @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }

        .branch-card, .admin-card, .group-card {
            background:var(--card-bg);
            backdrop-filter:blur(18px);
            border-radius:16px;
            padding:18px;
            border:1px solid var(--border-color);
            margin-bottom:14px;
            display:flex;
            flex-wrap:wrap;
            gap:14px;
            align-items:center;
            transition:all .2s;
            min-width:0;
            overflow-wrap:anywhere;
        }
        .branch-card { cursor:pointer; }
        .branch-card:hover, .admin-card:hover, .group-card:hover { background:rgba(59,130,246,.12); border-color:rgba(59,130,246,.28); }
        .branch-card-icon, .admin-avatar {
            width:54px;
            height:54px;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            border-radius:16px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:22px;
            font-weight:800;
            color:white;
            flex-shrink:0;
        }
        .admin-avatar { width:60px; height:60px; border-radius:20px; }
        .branch-card-info, .admin-info { flex:1; min-width:0; }
        .branch-card-info h3, .admin-info h3 { font-size:18px; font-weight:700; color:white; margin-bottom:6px; line-height:1.25; overflow-wrap:anywhere; }
        .branch-card-info p, .admin-info p { font-size:13px; color:var(--gray); margin-bottom:5px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
        .branch-card-actions, .admin-actions { display:flex; gap:8px; margin-left:auto; flex-wrap:wrap; }
        .groups-container { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:18px; }

        .tab-buttons {
            display:flex;
            gap:8px;
            margin-bottom:20px;
            border-bottom:1px solid var(--border-color);
            padding-bottom:12px;
            flex-wrap:wrap;
        }
        .tab-btn {
            padding:8px 14px;
            border-radius:999px;
            background:transparent;
            border:none;
            color:var(--gray);
            cursor:pointer;
            font-size:13px;
            transition:all .2s;
        }
        .tab-btn.active { background:rgba(59,130,246,.20); color:white; }
        .tab-btn:hover { background:rgba(59,130,246,.10); color:#60a5fa; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }

        .attendance-grid {
            overflow-x:auto;
            -webkit-overflow-scrolling:touch;
            border-radius:14px;
        }
        .attendance-grid table {
            min-width:640px;
            border-collapse:separate;
            border-spacing:0;
            font-size:12px;
        }
        .attendance-grid th,
        .attendance-grid td {
            text-align:center;
            padding:8px 5px;
            white-space:nowrap;
            max-width:none;
        }
        .attendance-grid th:first-child,
        .attendance-grid td:first-child {
            text-align:left;
            padding-left:12px;
            font-weight:600;
            min-width:150px;
            max-width:210px;
            white-space:normal;
        }
        .attendance-grid th:last-child,
        .attendance-grid td:last-child { min-width:86px; }
        .status-dot {
            display:inline-block;
            width:20px;
            height:20px;
            border-radius:50%;
            cursor:pointer;
            transition:transform .15s, box-shadow .15s;
            border:2px solid rgba(255,255,255,.08);
            vertical-align:middle;
        }
        .status-dot:hover { transform:scale(1.28); box-shadow:0 0 8px rgba(255,255,255,.20); }
        .status-dot.present { background:#10b981; border-color:#059669; }
        .status-dot.absent { background:#ef4444; border-color:#dc2626; }
        .status-dot.late { background:#f59e0b; border-color:#d97706; }
        .status-dot.empty { background:rgba(100,116,139,.30); border-color:rgba(100,116,139,.50); }
        .status-dot.frozen { background:#94a3b8; border-color:#64748b; cursor:not-allowed; }
        .frozen-row { opacity:.68; background:rgba(100,116,139,.08); }
        .attendance-frozen-cell { background:rgba(100,116,139,.18); cursor:not-allowed!important; text-align:center; user-select:none; }

        .login-icon-large {
            width:70px;
            height:70px;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            border-radius:20px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:28px;
            font-weight:800;
            color:white;
            margin:0 auto 20px;
        }

        @media (max-width:768px) {
            .sidebar { transform:translateX(-100%); }
            .sidebar.mobile-open { transform:translateX(0); }
            .main-content {
                margin-left:0!important;
                padding:72px 16px 16px!important;
            }
            .mobile-menu-toggle { display:flex!important; }
            .page-header { padding-left:52px; align-items:flex-start; }
            .page-header h1, .page-title h1 { font-size:20px; }
            .stats-grid { grid-template-columns:1fr 1fr; gap:12px; }
            .stat-card { padding:15px; }
            .stat-value { font-size:22px; }
            .groups-container { display:flex; flex-direction:column; gap:14px; }
            .branch-card, .admin-card { align-items:flex-start; }
            .branch-card-actions, .admin-actions { margin-left:0; width:100%; justify-content:flex-start; }
            .tab-buttons { overflow-x:auto; white-space:nowrap; flex-wrap:nowrap; padding-bottom:8px; }
            .tab-btn { flex-shrink:0; font-size:12px; padding:7px 13px; }

            .attendance-grid th:first-child,
            .attendance-grid td:first-child {
                position:sticky;
                left:0;
                background:rgba(15,23,42,.97);
                backdrop-filter:blur(10px);
                z-index:2;
                border-right:1px solid rgba(255,255,255,.06);
            }
            .attendance-grid th:last-child,
            .attendance-grid td:last-child {
                position:sticky;
                right:0;
                background:rgba(15,23,42,.97);
                backdrop-filter:blur(10px);
                z-index:2;
                border-left:1px solid rgba(255,255,255,.06);
            }

            .table-wrapper:not(.attendance-grid) table,
            .table-wrapper:not(.attendance-grid) thead,
            .table-wrapper:not(.attendance-grid) tbody,
            .table-wrapper:not(.attendance-grid) th,
            .table-wrapper:not(.attendance-grid) td,
            .table-wrapper:not(.attendance-grid) tr { display:block; width:100%; }
            .table-wrapper:not(.attendance-grid) thead { display:none; }
            .table-wrapper:not(.attendance-grid) tr {
                margin-bottom:12px;
                border-bottom:2px solid rgba(255,255,255,.10);
                padding-bottom:10px;
            }
            .table-wrapper:not(.attendance-grid) td {
                display:flex;
                justify-content:space-between;
                align-items:flex-start;
                gap:12px;
                padding:8px 0;
                border:none;
                font-size:13px;
                max-width:none;
                white-space:normal;
                text-align:right;
            }
            .table-wrapper:not(.attendance-grid) td::before {
                content:attr(data-label);
                color:var(--gray);
                font-size:11px;
                flex:0 0 96px;
                text-align:left;
            }
            .compact-table table { min-width:0; }
            .compact-table td .ellipsis { max-width:calc(100vw - 156px); }
            .modal { padding:16px; border-radius:18px; }
            .modal-footer .btn { flex:1 1 120px; }
        }

        @media (max-width:480px) {
            .stats-grid { grid-template-columns:1fr; }
            .btn { padding:8px 12px; font-size:12px; }
            .toast-container { right:16px; bottom:16px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="mobile-menu-toggle" id="mobileMenuToggle"><i class="fas fa-bars"></i></div>
    <aside class="sidebar hidden" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">UP</div>
                <div class="logo-text"><h2>UstozPro</h2><span>@UstozProBot</span></div>
            </div>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar" id="userAvatar">UP</div>
                <div class="user-info"><h4 id="sidebarUserName">Foydalanuvchi</h4><p id="sidebarBranchInfo"></p></div>
            </div>
            <button class="btn w-full" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Chiqish</button>
        </div>
    </aside>
    <main class="main-content hidden" id="mainContent"></main>
</div>
<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>
<div class="toast-container" id="toastContainer"></div>

<script>

        const { data: groups } = await sb.from('groups').select('id, branch_id');

        const groupBranch = {};

        (payments || []).forEach(p => {
            const branchId = groupBranch[p.group_id];

        });
        return revenueMap;
    }

    async function getGroupLessonDates(groupId, year, month) {
        const [{ data: schedules }, { data: group }] = await Promise.all([
            sb.from('schedules').select('day_of_week').eq('group_id', groupId),
            sb.from('groups').select('created_at, end_date').eq('id', groupId).maybeSingle()
        ]);
        const scheduleDays = [...new Set((schedules || []).map(s => Number(s.day_of_week)).filter(Boolean))];
        if(scheduleDays.length === 0) return [];

        const daysInMonth = new Date(year, month, 0).getDate();
        const monthStart = new Date(year, month - 1, 1);
        const monthEnd = new Date(year, month - 1, daysInMonth, 23, 59, 59);
        const groupStart = group?.created_at ? new Date(group.created_at) : monthStart;
        groupStart.setHours(0, 0, 0, 0);
        const groupEnd = group?.end_date ? new Date(group.end_date + 'T23:59:59') : monthEnd;
        const effectiveStart = groupStart > monthStart ? groupStart : monthStart;
        const effectiveEnd = groupEnd < monthEnd ? groupEnd : monthEnd;
        const weekShort = ['', 'Du', 'Se', 'Ch', 'Pa', 'Ju', 'Sh', 'Ya'];
        const dates = [];

        for(let d = 1; d <= daysInMonth; d++) {
            const current = new Date(year, month - 1, d);
            if(current < effectiveStart || current > effectiveEnd) continue;
            const dbDay = jsDayToDbDay(current);
            if(scheduleDays.includes(dbDay)) {
                dates.push({ day:d, dbDay, weekShort:weekShort[dbDay], dateStr:toIsoDateLocal(current) });
            }
        }
        return dates;
    }

    function buildAttendanceTableHtml(groupId, studentsRel, attendance, performance, lessonDates) {
        const attendanceMap = new Map((attendance || []).map(a => [`${a.student_id}|${a.lesson_date}`, a]));
        const performanceMap = new Map((performance || []).map(p => [`${p.student_id}|${p.lesson_date}`, p]));
        let html = `<div class="attendance-grid"><table><thead><tr><th>O'quvchi</th>`;
        lessonDates.forEach(ld => {
            html += `<th style="min-width:34px; font-size:10px;" title="${ld.dateStr}">${ld.day}<br><span class="muted-small">${ld.weekShort}</span></th>`;
        });
        html += `<th>O'rtacha %</th></tr></thead><tbody>`;

        (studentsRel || []).forEach(s => {
            const isFrozen = s.status === 'frozen';
            html += `<tr class="${isFrozen ? 'frozen-row' : ''}"><td>${escapeHtml(s.students?.full_name || '-')} ${isFrozen ? '<span class="badge badge-warning" style="font-size:10px; padding:2px 6px;">Muz</span>' : ''}</td>`;
            let perfSum = 0;
            let perfCount = 0;
            lessonDates.forEach(ld => {
                if(isFrozen) {
                    html += `<td class="attendance-frozen-cell"><span class="status-dot frozen" title="Muzlatilgan"></span></td>`;
                    return;
                }
                const key = `${s.student_id}|${ld.dateStr}`;
                const att = attendanceMap.get(key);
                const perf = performanceMap.get(key);
                const status = att ? att.status : (perf ? 'present' : null);
                const dotClass = status === 'present' ? 'present' : (status === 'absent' ? 'absent' : (status === 'late' ? 'late' : 'empty'));
                const tooltip = status === 'present' ? 'Keldi' : (status === 'absent' ? 'Kelmadi' : (status === 'late' ? 'Kechikdi' : 'Belgilanmagan'));
                html += `<td><span class="status-dot ${dotClass}" onclick="openAttendanceMarker('${groupId}','${s.student_id}','${ld.dateStr}','${status || ''}')" title="${tooltip}"></span></td>`;
                if(perf) {
                    perfSum += Number(perf.percentage) || 0;
                    perfCount++;
                }
            });
            const avg = (!isFrozen && perfCount > 0) ? Math.round(perfSum / perfCount) : 0;
            html += `<td>${!isFrozen ? `<span class="badge ${avg >= 70 ? 'badge-success' : avg >= 40 ? 'badge-warning' : 'badge-danger'}">${avg}%</span>` : '-'}</td></tr>`;
        });

        html += '</tbody></table></div>';
        return html;
    }

    async function calculateStudentDebt(studentId, groupId) {
        if(!studentId || !groupId) return 0;
        const [{ data: gs }, { data: gr }, { data: payments }] = await Promise.all([
            sb.from('group_students').select('discount_percent').eq('student_id', studentId).eq('group_id', groupId).maybeSingle(),
            sb.from('groups').select('price').eq('id', groupId).single(),
            sb.from('payments').select('amount').eq('student_id', studentId).eq('group_id', groupId)
        ]);
        const discount = Number(gs?.discount_percent) || 0;
        const price = Number(gr?.price) || 0;
        const due = Math.round(price * (1 - discount / 100));
        const paid = (payments || []).reduce((sum, p) => sum + (Number(p.amount) || 0), 0);
        return Math.max(0, due - paid);
    }
    window.calculateStudentDebt = calculateStudentDebt;

    async function calculateTeacherSalaryForMonth(teacherId, branchId, year, month) {
        const { start, end } = monthRange(year, month);
        const [{ data: teacher }, { data: groups }] = await Promise.all([
            sb.from('users').select('*').eq('id', teacherId).single(),
            sb.from('groups').select('id, name').eq('teacher_id', teacherId)
        ]);

        const groupIds = (groups || []).map(g => g.id);
        let totalRevenue = 0;
        const groupRevenueMap = {};
        if(groupIds.length > 0) {
            const { data: payments } = await sb.from('payments')
                .select('amount, group_id')
                .in('group_id', groupIds)
                .gte('payment_date', start)
                .lte('payment_date', end);
            (payments || []).forEach(p => {
                const amount = Number(p.amount) || 0;
                totalRevenue += amount;
                groupRevenueMap[p.group_id] = (groupRevenueMap[p.group_id] || 0) + amount;
            });
        }

        const salaryCalculated = teacher?.salary_type === 'percent'
            ? Math.round(totalRevenue * (Number(teacher.salary_percent) || 0) / 100)
            : Number(teacher?.salary || 0);

        const { data: salaryPays } = await sb.from('expenses')
            .select('amount, expense_date, description')
            .eq('branch_id', branchId)
            .eq('expense_type', 'salary')
            .eq('created_by', teacherId)
            .gte('expense_date', start)
            .lte('expense_date', end)
            .order('expense_date', { ascending:false });

        const paidAmount = (salaryPays || []).reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
        return {
            teacher,
            groups:(groups || []).map(g => ({ ...g, revenue:groupRevenueMap[g.id] || 0 })),
            totalRevenue,
            salaryCalculated,
            paidAmount,
            remaining:Math.max(0, salaryCalculated - paidAmount),
            advance:Math.max(0, paidAmount - salaryCalculated),
            salaryPays:salaryPays || []
        };
    }

    window.toggleUserActive = async userId => {
        const { data: user, error } = await sb.from('users').select('is_active, full_name').eq('id', userId).single();
        if(error || !user) {
            if(error) showToast('Xatolik: ' + error.message, 'error');
            return;
        }
        const newStatus = !user.is_active;
        const { error: updateError } = await sb.from('users').update({ is_active: newStatus }).eq('id', userId);
        if(updateError) {
            showToast('Xatolik: ' + updateError.message, 'error');
            return;
        }
        showToast(`${user.full_name} ${newStatus ? 'faollashtirildi' : 'muzlatildi'}`);

        else if(currentUser.role === 'super_admin') renderSuperAdmins();

    async function loadGroupStudents(groupId) {
        const [{ data:rels }, { data:group }] = await Promise.all([
            sb.from('group_students').select('*, students(full_name, phone)').eq('group_id', groupId).eq('status', 'active'),
            sb.from('groups').select('price').eq('id', groupId).single()
        ]);

        if(!rels || rels.length === 0) {
            container.innerHTML = `<div class="card text-center" style="color:var(--gray);">O'quvchi mavjud emas</div><button class="btn btn-sm btn-primary" onclick="openAddStudentToGroup('${groupId}')"><i class="fas fa-plus"></i> Qo'shish</button>`;
            return;
        }
        let totalPaid = 0;
        let rows = '';
        for(const rel of rels) {
            const discount = Number(rel.discount_percent) || 0;
            const finalPrice = Math.round((Number(group?.price) || 0) * (1 - discount / 100));
            const { data:payments } = await sb.from('payments').select('amount').eq('student_id', rel.student_id).eq('group_id', groupId);
            const paid = (payments || []).reduce((sum, p) => sum + (Number(p.amount) || 0), 0);
            totalPaid += paid;
            rows += `<tr>
                <td data-label="O'quvchi">${escapeHtml(rel.students?.full_name || '-')} ${discount ? `<span class="badge badge-warning">-${discount}%</span>` : ''}</td>
                <td data-label="Telefon">${escapeHtml(rel.students?.phone || '-')}</td>
                <td data-label="Sana">${formatDate(rel.joined_date)}</td>
                <td data-label="To'lov">${formatNumber(paid)} / ${formatNumber(finalPrice)} so'm</td>
                <td data-label="Amallar"><div class="action-icons"><div class="action-icon pay" onclick="openPaymentForGroupStudent('${rel.student_id}', '${groupId}', '${escapeHtml(rel.students?.full_name || '')}')"><i class="fas fa-money-bill-wave"></i></div><div class="action-icon" onclick="freezeStudentInGroup('${rel.id}', '${groupId}')"><i class="fas fa-snowflake"></i></div><div class="action-icon delete" onclick="removeStudentFromGroup('${rel.id}', '${groupId}')"><i class="fas fa-user-minus"></i></div></div></td>
            </tr>`;
        }
        container.innerHTML = `<div class="table-wrapper"><table><thead><tr><th>O'quvchi</th><th>Telefon</th><th>Sana</th><th>To'lov</th><th>Amallar</th></tr></thead><tbody>${rows}</tbody></table></div><div class="stat-card" style="margin-top:12px; text-align:right;"><strong>Jami yig'ilgan: ${formatNumber(totalPaid)} so'm</strong></div><div style="margin-top:10px;"><button class="btn btn-sm btn-primary" onclick="openAddStudentToGroup('${groupId}')"><i class="fas fa-plus"></i> Yangi o'quvchi</button></div>`;

    async function renderDebtors() {
        const branchId = await currentBranchId();
        const { data:students } = await sb.from('students').select('*').eq('branch_id', branchId).eq('is_active', true).order('full_name');
        const { data:branchGroups } = await sb.from('groups').select('id').eq('branch_id', branchId);
        const groupIds = (branchGroups || []).map(g => g.id);
        const debtors = [];
        for(const s of students || []) {
            let totalDebt = 0;
            const { data:rels } = groupIds.length
                ? await sb.from('group_students').select('*, groups(price, name)').eq('student_id', s.id).eq('status', 'active').in('group_id', groupIds)
                : { data:[] };
            for(const rel of rels || []) {
                const price = Number(rel.groups?.price) || 0;
                const discount = Number(rel.discount_percent) || 0;
                const finalPrice = Math.round(price * (1 - discount / 100));
                const { data:paidData } = await sb.from('payments').select('amount').eq('student_id', s.id).eq('group_id', rel.group_id);
                const paid = (paidData || []).reduce((sum, p) => sum + (Number(p.amount) || 0), 0);
                if(finalPrice - paid > 0) totalDebt += finalPrice - paid;
            }
            if(totalDebt > 0) debtors.push({ ...s, debt:totalDebt });
        }
        debtors.sort((a, b) => b.debt - a.debt);
        setMain(`<div class="page-header"><h1>Qarzdorlar</h1></div><div class="card"><div class="table-wrapper"><table><thead><tr><th>O'quvchi</th><th>Telefon</th><th>Qarz</th><th>Amallar</th></tr></thead><tbody>${debtors.map(d => `<tr><td data-label="O'quvchi">${escapeHtml(d.full_name)}</td><td data-label="Telefon">${escapeHtml(d.phone || '-')}</td><td data-label="Qarz"><span class="badge badge-danger">${formatNumber(d.debt)} so'm</span></td><td data-label="Amallar"><button class="btn btn-sm btn-primary" onclick="openPaymentForStudent('${d.id}')"><i class="fas fa-money-bill-wave"></i> To'lov</button></td></tr>`).join('') || '<tr><td colspan="4" style="text-align:center; color:var(--gray);">Qarzdorlar yo\'q</td></tr>'}</tbody></table></div></div>`);
    }

        const currentMonth = now.getMonth() + 1;
        let branchIds = [];
        const branchesMap = {};
        if(role === 'director') {
            const { data:branches } = await sb.from('branches').select('id, name');
            branchIds = (branches || []).map(b => b.id);
            (branches || []).forEach(b => branchesMap[b.id] = b.name);
        } else if(role === 'super_admin') {
            const { data:branches } = await sb.from('branches').select('id, name').eq('created_by', currentUser.id);
            branchIds = (branches || []).map(b => b.id);
            (branches || []).forEach(b => branchesMap[b.id] = b.name);
        } else {
            const bid = await currentBranchId();
            branchIds = [bid];
            branchesMap[bid] = currentBranch?.name || 'Filial';
        }
        setMain(`<div class="page-header"><h1>Hisobotlar</h1></div>
        <div class="card"><div class="form-group" style="display:flex; gap:12px; flex-wrap:wrap;"><select id="reportYear" onchange="updateReportTable()">${[2024, 2025, 2026, 2027].map(y => `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}</option>`).join('')}</select><select id="reportMonth" onchange="updateReportTable()"><option value="all">Butun yil</option>${Array.from({ length:12 }, (_, i) => `<option value="${i + 1}" ${i + 1 === currentMonth ? 'selected' : ''}>${new Date(2024, i).toLocaleString('uz-UZ', { month:'long' })}</option>`).join('')}</select></div><div id="reportTableContainer">Yuklanmoqda...</div></div>`);
        window.updateReportTable = async () => {
            const year = document.getElementById('reportYear').value;
            const month = document.getElementById('reportMonth').value;
            let startDate;
            let endDate;
            if(month === 'all') {
                startDate = `${year}-01-01`;
                endDate = `${year}-12-31`;
            } else {
                const r = monthRange(Number(year), Number(month));
                startDate = r.start;
                endDate = r.end;
            }
            const { data:groups } = await sb.from('groups').select('id, branch_id').in('branch_id', branchIds);
            const groupIds = (groups || []).map(g => g.id);
            const groupBranchMap = {};
            (groups || []).forEach(g => groupBranchMap[g.id] = g.branch_id);
            const [{ data:payments }, { data:expenses }] = await Promise.all([
                groupIds.length ? sb.from('payments').select('amount, group_id').in('group_id', groupIds).gte('payment_date', startDate).lte('payment_date', endDate) : Promise.resolve({ data:[] }),
                sb.from('expenses').select('amount, branch_id').in('branch_id', branchIds).gte('expense_date', startDate).lte('expense_date', endDate)
            ]);
            const branchIncome = {};
            const branchExpense = {};
            branchIds.forEach(id => { branchIncome[id] = 0; branchExpense[id] = 0; });
            (payments || []).forEach(p => {
                const bid = groupBranchMap[p.group_id];
                if(bid) branchIncome[bid] += Number(p.amount) || 0;
            });
            (expenses || []).forEach(e => {
                if(e.branch_id) branchExpense[e.branch_id] += Number(e.amount) || 0;
            });
            let totalIncome = 0;
            let totalExpense = 0;
            const rows = branchIds.map(bid => {
                const inc = branchIncome[bid] || 0;
                const exp = branchExpense[bid] || 0;
                totalIncome += inc;
                totalExpense += exp;
                return `<tr><td data-label="Filial">${escapeHtml(branchesMap[bid] || '-')}</td><td data-label="Daromad" style="color:#34d399;">${formatNumber(inc)} so'm</td><td data-label="Xarajat" style="color:#f87171;">${formatNumber(exp)} so'm</td><td data-label="Foyda">${formatNumber(inc - exp)} so'm</td></tr>`;
            }).join('');
            document.getElementById('reportTableContainer').innerHTML = `<div class="stats-grid"><div class="stat-card"><div class="stat-value text-success">${formatNumber(totalIncome)} so'm</div><div class="stat-label">Daromad</div></div><div class="stat-card"><div class="stat-value text-danger">${formatNumber(totalExpense)} so'm</div><div class="stat-label">Xarajat</div></div><div class="stat-card"><div class="stat-value">${formatNumber(totalIncome - totalExpense)} so'm</div><div class="stat-label">Foyda</div></div></div><div class="table-wrapper"><table><thead><tr><th>Filial</th><th>Daromad</th><th>Xarajat</th><th>Foyda</th></tr></thead><tbody>${rows}</tbody></table></div>`;
        };
        window.updateReportTable();
    }

    async function renderLeads() {

        <div class="card"><div class="table-wrapper"><table><thead><tr><th>Ism</th><th>Telefon</th><th>Fan</th><th>Holat</th><th>Sana</th></tr></thead><tbody>${(leads || []).map(l => `<tr><td data-label="Ism">${escapeHtml(l.full_name)}</td><td data-label="Telefon">${escapeHtml(l.phone)}</td><td data-label="Fan">${escapeHtml(l.interested_subject || '-')}</td><td data-label="Holat"><span class="badge badge-info">${escapeHtml(l.status || 'new')}</span></td><td data-label="Sana">${formatDate(l.created_at)}</td></tr>`).join('') || '<tr><td colspan="5">Murojaatlar yo\'q</td></tr>'}</tbody></table></div></div>`);

    async function renderTeacherDashboard() {
        const { data:groups } = await sb.from('groups').select('*').eq('teacher_id', currentUser.id).eq('status', 'active').order('name');
        let studentCount = 0;
        for(const g of groups || []) {
            const { count } = await sb.from('group_students').select('*', { count:'exact', head:true }).eq('group_id', g.id).eq('status', 'active');
            studentCount += count || 0;

        setMain(`<div class="page-header"><h1>${escapeHtml(currentUser.full_name)}</h1></div>
        <div class="stats-grid"><div class="stat-card"><div class="stat-value">${groups?.length || 0}</div><div class="stat-label">Guruhlarim</div></div><div class="stat-card"><div class="stat-value">${studentCount}</div><div class="stat-label">O'quvchilarim</div></div></div>
        <div class="card"><h3 class="card-title">Mening guruhlarim</h3><div class="table-wrapper"><table><thead><tr><th>Guruh</th><th>Status</th></tr></thead><tbody>${(groups || []).map(g => `<tr><td data-label="Guruh">${escapeHtml(g.name)}</td><td data-label="Status"><span class="badge badge-success">${escapeHtml(g.status || 'active')}</span></td></tr>`).join('') || '<tr><td colspan="2">Guruhlar yo\'q</td></tr>'}</tbody></table></div></div>`);

    async function renderTeacherAttendance() {
        const { data:groups } = await sb.from('groups').select('id, name').eq('teacher_id', currentUser.id).eq('status', 'active').order('name');
        if(!groups || groups.length === 0) {
            setMain('<div class="page-header"><h1>Davomat va o\'zlashtirish</h1></div><div class="card text-center" style="color:var(--gray);">Sizga biriktirilgan faol guruhlar mavjud emas.</div>');
            return;
        }
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth() + 1;
        setMain(`<div class="page-header"><h1>Davomat va o'zlashtirish</h1></div><div class="card">
            <div class="form-group" style="display:flex; flex-wrap:wrap; gap:12px; align-items:end;">
                <div style="flex:2; min-width:200px;"><label>Guruh</label><select id="teacherGroupSelect" onchange="loadTeacherAttendanceTable()">${groups.map(g => `<option value="${g.id}">${escapeHtml(g.name)}</option>`).join('')}</select></div>
                <div style="flex:1; min-width:140px;"><label>Oy</label><select id="teacherMonthSelect" onchange="loadTeacherAttendanceTable()">${Array.from({ length:12 }, (_, i) => `<option value="${i + 1}" ${i + 1 === currentMonth ? 'selected' : ''}>${new Date(2024, i).toLocaleString('uz-UZ', { month:'long' })}</option>`).join('')}</select></div>
                <div style="flex:1; min-width:120px;"><label>Yil</label><select id="teacherYearSelect" onchange="loadTeacherAttendanceTable()">${[2024, 2025, 2026, 2027].map(y => `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}</option>`).join('')}</select></div>
                <button class="btn btn-sm btn-primary" onclick="loadTeacherAttendanceTable()"><i class="fas fa-sync-alt"></i></button>
            </div>
            <div id="teacherAttendanceTableContainer">Yuklanmoqda...</div>
        </div>`);

        window.loadTeacherAttendanceTable = async () => {
            const groupId = document.getElementById('teacherGroupSelect')?.value;
            const container = document.getElementById('teacherAttendanceTableContainer');
            if(!groupId || !container) return;
            currentTeacherGroupId = groupId;
            const month = parseInt(document.getElementById('teacherMonthSelect')?.value);
            const year = parseInt(document.getElementById('teacherYearSelect')?.value);
            const { start, end } = monthRange(year, month);
            const lessonDates = await getGroupLessonDates(groupId, year, month);
            if(!lessonDates.length) {
                container.innerHTML = '<div class="card text-center" style="color:var(--gray);">Bu oy uchun dars kuni topilmadi. Guruh jadvalini kiriting.</div>';
                return;
            }
            const [{ data:studentsRel }, { data:attendance }, { data:performance }] = await Promise.all([
                sb.from('group_students').select('*, students(full_name)').eq('group_id', groupId).in('status', ['active', 'frozen']),
                sb.from('attendance').select('*').eq('group_id', groupId).gte('lesson_date', start).lte('lesson_date', end),
                sb.from('student_performance').select('*').eq('group_id', groupId).gte('lesson_date', start).lte('lesson_date', end)
            ]);
            if(!studentsRel || studentsRel.length === 0) {
                container.innerHTML = '<div class="card text-center" style="color:var(--gray);">Bu guruhda o\'quvchilar yo\'q</div>';
                return;
            }
            container.innerHTML = buildAttendanceTableHtml(groupId, studentsRel, attendance, performance, lessonDates);
        };
        window.loadTeacherAttendanceTable();
    }

    async function renderTeacherSalary() {
        const branchId = currentUser.branch_id || currentBranch?.id;
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth() + 1;
        setMain(`<div class="page-header"><h1>Mening maoshim</h1></div>
        <div class="card">
            <div class="form-group" style="display:flex; flex-wrap:wrap; gap:12px; align-items:end;">
                <div style="flex:1; min-width:150px;"><label>Oy</label><select id="teacherSalaryMonth" onchange="loadTeacherSalaryPanel()">${Array.from({ length:12 }, (_, i) => `<option value="${i + 1}" ${i + 1 === currentMonth ? 'selected' : ''}>${new Date(2024, i).toLocaleString('uz-UZ', { month:'long' })}</option>`).join('')}</select></div>
                <div style="flex:1; min-width:120px;"><label>Yil</label><select id="teacherSalaryYear" onchange="loadTeacherSalaryPanel()">${[2024, 2025, 2026, 2027].map(y => `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}</option>`).join('')}</select></div>
                <button class="btn btn-sm btn-primary" onclick="loadTeacherSalaryPanel()"><i class="fas fa-sync-alt"></i> Yangilash</button>
            </div>
            <div id="teacherSalaryPanel">Yuklanmoqda...</div>
        </div>`);

        window.loadTeacherSalaryPanel = async () => {
            const month = parseInt(document.getElementById('teacherSalaryMonth')?.value) || currentMonth;
            const year = parseInt(document.getElementById('teacherSalaryYear')?.value) || currentYear;
            const summary = await calculateTeacherSalaryForMonth(currentUser.id, branchId, year, month);
            const payRows = summary.salaryPays.map(p => `<tr><td data-label="Sana">${formatDate(p.expense_date)}</td><td data-label="Summa" style="color:#34d399;">${formatNumber(p.amount)} so'm</td><td data-label="Izoh">${escapeHtml(p.description || '-')}</td></tr>`).join('');
            const reportMonths = [];
            for(let i = 0; i < 12; i++) {
                const dt = new Date(year, month - 1 - i, 1);
                reportMonths.push({ year:dt.getFullYear(), month:dt.getMonth() + 1 });
            }
            const reportData = await Promise.all(reportMonths.map(item => calculateTeacherSalaryForMonth(currentUser.id, branchId, item.year, item.month).then(summary => ({ ...item, summary }))));
            const reportRows = reportData.map(item => `<tr><td data-label="Oy">${monthNameUz(item.year, item.month)}</td><td data-label="Hisoblangan" style="color:#60a5fa;">${formatNumber(item.summary.salaryCalculated)} so'm</td><td data-label="Berilgan" style="color:#34d399;">${formatNumber(item.summary.paidAmount)} so'm</td><td data-label="Qolgan" style="color:${item.summary.remaining > 0 ? '#f87171' : '#34d399'};">${formatNumber(item.summary.remaining)} so'm</td></tr>`).join('');
            document.getElementById('teacherSalaryPanel').innerHTML = `<div class="stats-grid">
                <div class="stat-card"><div class="stat-value" style="color:#60a5fa;">${formatNumber(summary.salaryCalculated)} so'm</div><div class="stat-label">Hisoblangan maosh</div></div>
                <div class="stat-card"><div class="stat-value text-success">${formatNumber(summary.paidAmount)} so'm</div><div class="stat-label">Berilgan summa</div></div>
                <div class="stat-card"><div class="stat-value" style="color:${summary.remaining > 0 ? '#f87171' : '#34d399'};">${formatNumber(summary.remaining)} so'm</div><div class="stat-label">Qolgan qarz</div></div>
                <div class="stat-card"><div class="stat-value" style="color:${summary.advance > 0 ? '#f59e0b' : '#94a3b8'};">${formatNumber(summary.advance)} so'm</div><div class="stat-label">Oldindan berilgan</div></div>
            </div>
            <div class="card"><h3 class="card-title">${monthNameUz(year, month)} to'lovlari</h3><div class="table-wrapper"><table><thead><tr><th>Sana</th><th>Summa</th><th>Izoh</th></tr></thead><tbody>${payRows || '<tr><td colspan="3" style="text-align:center; color:var(--gray);">Bu oyda to\'lov yo\'q</td></tr>'}</tbody></table></div></div>
            <div class="card" style="margin-bottom:0;"><h3 class="card-title">12 oylik hisobot</h3><div class="table-wrapper"><table><thead><tr><th>Oy</th><th>Hisoblangan</th><th>Berilgan</th><th>Qolgan</th></tr></thead><tbody>${reportRows}</tbody></table></div></div>`;
        };
        await window.loadTeacherSalaryPanel();
    }

        const [{ data:attendance }, { data:performance }] = await Promise.all([

        setMain(`<div class="page-header"><h1>Davomatim</h1></div><div class="card"><div class="table-wrapper"><table><thead><tr><th>Sana</th><th>Guruh</th><th>Holat</th><th>O'zlashtirish</th></tr></thead><tbody>${(attendance || []).map(a => {

        }).join('') || '<tr><td colspan="4">Davomat yo\'q</td></tr>'}</tbody></table></div></div>`);
    }

    async function renderStudentPayments() {
        const { data:payments } = await sb.from('payments').select('*, groups(name)').eq('student_id', currentUser.id).order('payment_date', { ascending:false });
        const total = (payments || []).reduce((sum, p) => sum + (Number(p.amount) || 0), 0);
        setMain(`<div class="page-header"><h1>To'lovlarim</h1></div><div class="card"><div class="table-wrapper"><table><thead><tr><th>Sana</th><th>Guruh</th><th>Summa</th><th>Tur</th></tr></thead><tbody>${(payments || []).map(p => `<tr><td data-label="Sana">${formatDate(p.payment_date)}</td><td data-label="Guruh">${escapeHtml(p.groups?.name || '-')}</td><td data-label="Summa" style="color:#34d399;">${formatNumber(p.amount)} so'm</td><td data-label="Tur">${getPaymentTypeLabel(p.payment_type)}</td></tr>`).join('') || '<tr><td colspan="4">To\'lovlar yo\'q</td></tr>'}</tbody></table></div><div class="stat-card" style="margin-top:14px; text-align:right;"><strong>Jami to\'langan: ${formatNumber(total)} so'm</strong></div></div>`);
    }

    showLoginModal();
})();
</script>
